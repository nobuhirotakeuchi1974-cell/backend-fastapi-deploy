name: Deploy FastAPI to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Zip app
        run: |
          cd backend
          zip -r ../app.zip .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'tech0-gen-11-step3-2-py-62'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_8B1F8FA89EDA46A88FB4A099ADF6B565 }}
          package: app.zip
